<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Geneva,sans-serif;background:#f4f3ef;color:#1a1a1a;padding:1rem}
#app{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.header img{height:48px}
.header-right{text-align:right}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:12px;color:#888;margin-top:2px}
.prog-wrap{margin-bottom:1rem}
.prog-bar{height:5px;background:#e0ddd5;border-radius:3px}
.prog-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .35s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-top:4px}
.nav{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:.85rem}
.btn{padding:8px 16px;border-radius:8px;border:1px solid #d0cdc5;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#1a1a1a;transition:all .2s}
.btn:hover{background:#f4f3ef}
.btn-results{border-color:#0F6E56;color:#0F6E56;font-weight:600;margin-left:auto}
.btn-results:hover{background:#E1F5EE}
.textbox{background:#f8f7f3;border-left:3px solid #1D9E75;border-radius:0 8px 8px 0;padding:1rem 1.25rem;margin-bottom:1.1rem;font-size:15px;line-height:1.85;color:#1a1a1a;width:100%}
.textbox mark{background:#FAC775;color:#412402;border-radius:3px;padding:1px 3px;font-style:normal}
.key-label{margin-bottom:.85rem;font-size:12px;font-weight:600;color:#92560A;background:#FEF3DC;border:1px solid #FAC775;border-radius:6px;display:inline-block;padding:4px 10px}
.question{font-size:16px;font-weight:600;margin-bottom:.9rem}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.choice{padding:11px 15px;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;background:#fff;width:100%}
.choice:hover:not(.correct):not(.wrong){background:#f4f3ef}
.choice .badge{font-weight:600;min-width:22px}
.choice.correct{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.choice.wrong{border-color:#993C1D;background:#FAECE7;color:#4A1B0C}
.feedback.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5;border-radius:8px;padding:10px 14px;margin-top:.75rem}
.feedback.ko{background:#FAECE7;color:#4A1B0C;border:1px solid #F0997B;border-radius:8px;padding:10px 14px;margin-top:.75rem}
.summary-card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.score-big{font-size:42px;font-weight:700;color:#1D9E75}
.nclc-badge{font-size:28px;font-weight:700;color:#BA7517;margin:8px 0}
.grid{display:flex;flex-wrap:wrap;gap:6px;margin:1rem 0}
.gcell{width:34px;height:34px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;transition:opacity .2s}
.gcell:hover{opacity:.8}
.gcell.ok{background:#1D9E75}
.gcell.ko{background:#993C1D}
.gcell.na{background:#ccc;color:#555}
.btn-report{padding:10px 20px;background:#1D9E75;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin-right:8px;margin-top:8px}
.btn-restart{padding:10px 20px;background:#fff;color:#1a1a1a;border:1px solid #d0cdc5;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin-top:8px}
.note-small{font-size:11px;color:#aaa;margin-top:8px}
.report-q{background:#fff;border:1px solid #e0ddd5;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}
.report-q .r-text{background:#f8f7f3;border-left:3px solid #1D9E75;border-radius:0 8px 8px 0;padding:.75rem 1rem;font-size:14px;line-height:1.8;margin-bottom:.75rem}
.r-correct{color:#085041;font-size:13px;font-weight:600;padding:4px 0}
.r-wrong{color:#4A1B0C;font-size:13px;font-weight:600;padding:4px 0}
.btn-back{padding:8px 16px;border-radius:8px;border:1px solid #0F6E56;background:#fff;color:#0F6E56;cursor:pointer;font-size:14px;font-weight:600;margin-bottom:1rem}
</style>

[[{"t":"L'Association des étudiants de l'École des sciences et techniques VOUS INVITE A LA SOIRÉE DE FIN D'ANNÉE. Samedi 15 décembre à partir de 20h. VENEZ NOMBREUX !","q":"Qu'est-ce que les étudiants organisent ?","c":["Un anniversaire.","Un concert.","Une exposition.","Une fête."],"a":3,"k":"SOIRÉE DE FIN D'ANNÉE"},{"t":"Logement, études ou téléphone portable, tout coûte cher pour les jeunes à l'université. Alors 80% des parents aident leurs enfants. Le père d'Hamza, 18 ans, calcule combien ça lui coûtera : environ 8% de son salaire.","q":"Qu'est-ce que cet article dit sur les jeunes ?","c":["Ils ont besoin de l'aide de leur famille.","Ils travaillent pour payer leur logement.","Ils veulent finir leurs études rapidement.","Ils vont à l'université dans une autre ville."],"a":0,"k":"80% des parents aident leurs enfants"},{"t":"VOUS AUSSI, VOUS SOUHAITEZ DONNER DE VOTRE TEMPS À DES HOMMES ET DES FEMMES DANS LE BESOIN ? L'association « Les Restos du Cœur » de Nice vous propose de participer à la préparation des déjeuners du lundi au samedi, le matin. Appelez-nous au 08 44 25 68 79 87","q":"Qu'est-ce-que cette annonce propose ?","c":["D'aider à faire des repas.","De changer de profession.","De servir dans une cantine.","De soigner des habitants."],"a":0,"k":"participer à la préparation des déjeuners"},{"t":"Camille,\nJe ne peux pas te retrouver au concert ce soir, désolé. Mes enfants sont malades et je dois rester avec eux. Viens déjeuner à la maison dimanche. Je pars bientôt en voyage, j'aimerais te voir avant mon départ.\nBises,\nDriss","q":"Qu'est-ce que Driss propose à son amie ?","c":["D'aller à un concert.","D'organiser un voyage.","De déjeuner chez lui.","De garder les enfants."],"a":2,"k":"Viens déjeuner à la maison dimanche"},{"t":"Résidence Bellevue\nRue de l'Océan 25013 Mer Sur l'Isle\nDésignation Nuit + petit-déj\nParking sécurisé Entreprise Jolifleur Bruxelles Quantité Facture N°13 3 Prix 250,00 euros gratuit","q":"Que doit payer l'entreprise Jolifeur ?","c":["Un repas au restaurant.","Un séjour à l'hôtel.","Une commande de matériel.","Une location de voiture."],"a":1,"k":"Nuit + petit-déj"},{"t":"De : cannelle@lilo.com\nA : Elke@mail.com\nSalut Elke,\nC'est bientôt la fête de nos 20 ans de mariage ! Beaucoup d'invités viendront avec leurs enfants. Comme tu adores les petits, pourrais-tu t'occuper d'eux en journée ? Quand ils seront couchés, nous pourrons danser tous ensemble !\nMerci, bisous.\nCannelle.","q":"Que demande Cannelle à son amie ?","c":["D'écrire aux invites.","D'organiser la fête.","De garder des enfants.","De préparer des danses."],"a":2,"k":"pourrais-tu t'occuper d'eux en journée"},{"t":"Adèle,\nN'oublie pas l'anniversaire de Raphael ! On pourrait partir vers 19h et aller ensemble chez lui : où est-ce qu'on se retrouve ? Si tu ne peux pas venir finalement, appelle-moi !\nBonne journée, Camille","q":"Pourquoi est-ce que Camille écrit ce message ?","c":["Pour acheter un cadeau avec elle.","Pour annuler sa venue à une fête.","Pour décider d'un rendez-vous.","Pour inviter son amie a diner."],"a":2,"k":"où est-ce qu'on se retrouve"},{"t":"Madame Channmont,\nVous avez participé à notre concours et vous avez gagné un séjour d'une semaine tout compris (transport, hébergement, restauration) pour deux personnes en Italie ! Prenez Contact par courriel avec notre service clientèle pour avoir toutes les informations.\nLe service commercial.","q":"Que doit faire madame Chanmont ?","c":["Écrire un message.","Prendre un billet d'avion.","Réserver un hôtel.","S'inscrire à un jeu."],"a":0,"k":"Prenez Contact par courriel"},{"t":"Studio Céline\nL'école de danse « Studio Céline » ouvre ses portes au public le 16 septembre. C'est GRATUIT : Venez essayer nos cours toute la journée. Au programme : salsa, salsa, tango, danse moderne et un goûter (boissons et gâteaux) !","q":"Qu'est-ce que cette école de danse propose ?","c":["De participer à un concours.","De s'inscrire à un stage.","De tester des activités.","De voir un spectacle."],"a":2,"k":"Venez essayer nos cours toute la journée"},{"t":"La commune de Saint-Brieuc participe au concours Europan sur le thème « De la gare à la mer ». De jeunes architectes ont imaginé la ville de demain, avec de nouveaux espaces publics, un meilleur partage de l'espace entre piétons, vélos et véhicules. Les gagnants présenteront leur projet aux habitants qui choisiront le plus intéressant.","q":"Quel est le but du concours Europan ?","c":["Dessiner des bâtiments publics originaux.","Donner le goût du voyage aux habitants.","Inventer une ville facile à vivre pour tous.","Prévoir de nouveaux moyens de transport."],"a":2,"k":"la ville de demain"},{"t":"VOS ENFANTS AIMENT MARCHER, COURIR OU NAGER ? NOTRE CENTRE D'ÉTÉ POUR LES 7-17 ANS EST FAIT POUR EUX ! Tarifs à la journée, à la semaine ou au moins. Prix réduits pour les habitants de Paris. Allez sur notre site www.soleilpourtous.fr pour plus d'informations.","q":"Qu'est-ce que cette annonce propose ?","c":["Des informations sur les sports.","Des activités pour l'été.","Des promotions pour les enfants.","Des visites de Paris."],"a":1,"k":"CENTRE D'ÉTÉ POUR LES 7-17 ANS"},{"t":"Le « ski lent » privilégie le plaisir. Le plaisir du ski, ce n'est plus seulement la vitesse et la performance. Certains skieurs cherchent avant tout à prendre leur temps, à vivre une nouvelle expérience : le ski lent répond à ces souhaits. Ainsi des stations proposent des zones tranquilles, où la vitesse est interdite. On descend sans se presser, on soigne son style, sans nécessairement être débutant. Une discipline qui séduit et qui demande peu d'entrainement.","q":"Que propose-t-on aux skieurs dans ce texte ?","c":["D'améliorer leur niveau de compétence.","De pratiquer leur sport différemment.","De se préparer à des compétitions.","De tester un autre type de matériel."],"a":1,"k":"prendre leur temps, à vivre une nouvelle expérience"},{"t":"Monsieur,\nTitulaire d'une licence en informatique de l'université d'Alger, je souhaiterais poursuivre un cursus à Paris XII dans le cadre d'un master 1 d'informatique. Intégrer votre université devrait me permettre d'atteindre le niveau d'expertise que je souhaite acquérir dans un métier qui est pour moi une vraie passion. Vous trouverez, ci-joint, mon dossier de candidature complet. En espérant que ma candidature saura retenir votre attention, je vous prie de croire, Monsieur, à l'expression de mes salutations distinguées.\nSélim Néri","q":"Qui est Sélim Néri ?","c":["Un candidat a des études supérieures.","Un étudiant en quête d'un stage.","Un informaticien en recherche d'emploi.","Un lycéen en demande d'orientation."],"a":0,"k":"poursuivre un cursus à Paris XII dans le cadre d'un master 1"},{"t":"Un projet surprenant : José, 13 ans, a gagné le Prix du Climat l'an dernier. Il a imaginé une banque écologique dans son pays. Si chaque mois, un enfant ramasse une certaine quantité de déchets (plastique, carton...), on lui donne une monnaie qu'il peut échanger contre de l'argent réel.","q":"De quoi parle cet article ?","c":["D'une banque pour les mineurs.","D'une idée nouvelle de recyclage.","Des enfants qui doivent travailler.","Du problème créé par les déchets."],"a":1,"k":"banque écologique"},{"t":"Les Français partent moins longtemps, mais plus souvent en vacances qu'il y a 20 ans. Avec la réduction du temps de travail, qui est aujourd'hui de trente-cinq heures par semaine, les Français ont des week-ends plus longs. Ils peuvent multiplier les courts séjours et cela, tout au long de l'année. Ainsi, l'activité n'est plus limitée aux saisons d'hiver et d'été : pour les professions du tourisme comme, par exemple, les animateurs de clubs de vacances, il y a maintenant du travail de janvier à décembre.","q":"Qu'apprend-on sur les métiers du tourisme en France ?","c":["Ils s'exercent sans interruption dans l'année.","Ils sont en difficulté à cause des trente-cinq heures.","Ils sont inadaptés aux besoins des vacances.","Ils sont saisonniers et occupés par des étudiants."],"a":0,"k":"il y a maintenant du travail de janvier à décembre"},{"t":"Les titres de transport (ticket, carte, etc.) en carton seront bientôt remplacés par une carte magnétique. Les voyageurs la paieront 2 euros et la rechargeront aux guichets et aux machines automatiques des gares. La carte sera valable dans le métro, les bus et les tramways.","q":"Qu'est-ce qu'on apprend sur les titres de transport ?","c":["Ils servent pour un seul trajet.","Les gens les jettent dans la rue.","Leur prix va encore augmenter.","On va arrêter de les vendre."],"a":3,"k":"seront bientôt remplacés par une carte magnétique"},{"t":"Félicitations !\nVous avez gagné une carte cadeau de 50€.\nVous pouvez l'utiliser pour acheter tous nos produits de beauté.\nAttention, vous ne pouvez pas l'échanger contre de l'argent ou la donner à une autre personne. Si vous la perdrez, vous n'êtes pas remboursé.","q":"Qu'est-ce qu'on peut faire avec cette carte ?","c":["Avoir des réductions sur certains articles.","Faire des courses dans un magasin.","Offrir une surprise pour un anniversaire.","Retirer de l'argent a un distributeur."],"a":1,"k":"acheter tous nos produits de beauté"},{"t":"Le sport arrive largement en tête des nombreuses activités extrascolaires proposées aux 12-16 ans. Les parents se font une obligation sociale d'inscrire leurs enfants à ces activités et de montrer aux autres qu'ils sont de « bons parents » qui veillent à l'épanouissement global de leurs enfants. Ils leur permettent ainsi de se divertir, de se dépenser, et de s'initier à un sport individuel ou collectif. C'est également l'occasion pour les enfants de découvrir et d'accepter leurs propres limites.","q":"Qu'est-ce qui incite les parents à inscrire leurs enfants à des activités sportives ?","c":["La pression de la société.","La réputation des clubs.","Les bienfaits pour la santé.","Les envies des adolescents."],"a":0,"k":"obligation sociale"},{"t":"PÉDAGOGIE\nTwitter dès l'école primaire, pour donner le goût d'écrire, de lire et de l'orthographe. Un instituteur raconte : « J'utilise Twitter dans ma classe depuis un an. Les productions d'élèves sont de plus en plus intéressantes. Grâce à Twitter, je peux approfondir les notions de façon concrète. Les activités scolaires paraissent artificielles, hors contexte voire dénuées de sens. Pourquoi essayer de maîtriser l'écriture ? Les enfants n'y songent même pas, car leurs travaux sont cantonnés à des cahiers, eux-mêmes enfermés dans des casiers ou des cartables. Ils n'ont pas l'occasion de partager leurs productions, de les confronter, d'argumenter leurs choix. »","q":"D'après cet article, qu'apporte l'utilisation de Twitter aux élèves ?","c":["Ils apprennent à se servir correctement des réseaux sociaux.","Ils communiquent plus facilement avec l'instituteur.","Ils comprennent mieux l'intérêt des apprentissages proposés.","Ils sont attentifs après un moment de détente."],"a":2,"k":"approfondir les notions de façon concrète"},{"t":"Dora Bruder, publié en 1997, est considéré comme l'un des meilleurs romans de Patrick Modiano. L'écrivain aime fouiller l'histoire de la capitale et fréquente de nombreuses bibliothèques. Un jour, il tombe sur une annonce parue le 31 décembre 1941 dans Paris-soir : « On recherche une jeune fille, Dora Bruder, 15 ans, 1m55, Visage ovale, yeux gris marron, manteau sport gris. Adresse toute indication à M. et Mme Bruder, 41, boulevard Ornano, Paris. » Modiano va alors s'attacher à lever le mystère de cette disparition en entraînant le lecteur dans les rues du 18e arrondissement.","q":"Que fait le journaliste dans cet extrait ?","c":["Il cite un extrait d'une œuvre de Modiano.","Il explique l'idée de départ d'un livre de Modiano.","Il présente le métier de Modiano à ses débuts.","Il raconte la rencontre entre Modiano et sa femme."],"a":1,"k":"lever le mystère de cette disparition"},{"t":"Envie de faire le clown ?\nPendant les vacances de Pâques, l'équipe d'animateurs du centre de loisirs dessinera chaque jour sur les joues des enfants des animaux marins : hippocampes, phoques, manchots, poissons-clowns...","q":"Quelle activité proposera-t-on aux enfants pendant les vacances de Pâques ?","c":["Un spectacle de cirque.","Une activité de maquillage.","Une rencontre avec un clown.","Une réclamation sur son achat."],"a":1,"k":"dessinera chaque jour sur les joues des enfants"},{"t":"Les consommateurs du passé acceptaient de manger de la viande en se souvenant que derrière il y avait un animal. Aujourd'hui, on achète du poisson, mais on ne veut pas voir les yeux et les arêtes. On veut un bifteck anonyme. Si l'on nous dit que derrière le steak il y avait une génisse de 18 mois, ça nous coupe l'appétit. Il s'agit de la consommation d'une viande qui n'a plus aucune référence à l'animal. En fait, on ne veut pas savoir ce que l'on mange, bien qu'en même temps, on veuille être sûr de ce que l'on mange.","q":"Quel est le paradoxe évoqué à propos des consommateurs ?","c":["Acheter les meilleurs produits et dépenser le moins possible.","Avoir la garantie de la qualité du produit.","Être amateur de viande et militer pour le bien-être animal.","Privilégier les aliments bio et avoir du mal à s'en procurer."],"a":1,"k":"on ne veut pas savoir ce que l'on mange, bien qu'en même temps, on veuille être sûr"},{"t":"Nous vous rappelons que la présence d'élèves de moins de seize ans en milieu professionnel est autorisée, dès lors qu'ils restent sous l'autorité de l'établissement d'enseignement scolaire ou de l'école. Tous les stages ou les périodes de formation en milieu professionnel ne peuvent s'adresser qu'à des élèves qui suivent un enseignement alterné ou un enseignement professionnel. Les stages ne peuvent être proposés qu'à des élèves âgés de quatorze ans au moins, comme le précise l'article 8 du décret n° 96-465 du 29 mai 1996 relatif à l'organisation de la formation au collège.","q":"Quel est l'objectif de cet article adressé aux enseignants ?","c":["Définir les conditions d'accueil des élèves en milieu professionnel.","Expliquer le déroulement des stages en entreprise pour les élèves.","Informer des mesures de sécurité des élèves lors de visites d'entreprises.","Lister les différents types de stages professionnels destinés aux élèves."],"a":0,"k":"la présence d'élèves de moins de seize ans en milieu professionnel est autorisée"},{"t":"On réserve trop facilement le covoiturage aux étudiants sans un sou. Les clichés sont tenaces. Pourtant, le temps de la petite annonce papier accrochée près de la machine à café est bel et bien terminé, les moyens de communication ont changé les choses. L'organisation d'un trajet entre plusieurs personnes qui se rendent dans la même direction est devenue si simple et si efficace avec les sites spécialisés que le covoiturage est en train d'élargir son public et de gagner son statut de mode de transport à part entière.","q":"Quel développement connaît le covoiturage ?","c":["Il devient la solution idéale des voyages organisés à la dernière minute.","Il est accessible à un nombre croissant d'utilisateurs grâce à internet.","Il occupe une place grandissante dans les petites annonces des journaux.","Il s'impose comme le moyen de déplacement à la mode chez les jeunes."],"a":1,"k":"élargir son public"},{"t":"SEIS sera le premier sismomètre déployé sur un autre sol que celui de la Terre. Sur Mars, cet instrument français va ausculter les séismes qui secouent la planète rouge et récolter des données qui permettront de déterminer si le noyau de la planète est liquide ou solide. Mars a le même âge que la planète Terre, mais il y a 3 ou 4 milliards d'années, toute vie y a cessé et elle est devenue une planète morte. Si nous savons déjà de quoi sont constituées son atmosphère et sa surface, nous ignorons encore ce qui s'est produit à ce moment-là et ce qu'elle recèle dans son sous-sol.","q":"Pourquoi SEIS a-t-il été envoyé sur Mars ?","c":["Pour comparer son histoire à celle de la Terre.","Pour évaluer les possibilités d'aller y vivre.","Pour expliquer son grand nombre de séismes.","Pour obtenir des données sur sa composition."],"a":3,"k":"récolter des données qui permettront de déterminer si le noyau de la planète est liquide ou solide"},{"t":"Ma conviction est que l'économie collaborative, l'économie du partage, s'installe durablement. Elle repose sur la mise en réseau grâce au numérique et sur la quête de valeurs morales et culturelles. La crise économique en est un accélérateur, car ces pratiques permettent de consommer mieux pour moins cher ou de générer des revenus complémentaires. L'usage de ces services augmente à grande vitesse. Ainsi, 80% des 18-25 ans préféreraient vivre sans voiture que sans smartphone. Car la voiture, aujourd'hui, est dans le smartphone via le covoiturage, l'autopartage, la location entre particuliers ! L'accès à un bien devient plus pratique que sa possession. La question de demain sera : « Serez-vous assez intelligent pour ne pas posséder ? ».","q":"Que constate l'auteur de cet article ?","c":["L'essor de nouveaux modes de consommation.","La stagnation de la dépendance au numérique.","Le développement des voitures ultra connectées.","Le recul des difficultés économiques des ménages."],"a":0,"k":"l'économie collaborative, l'économie du partage, s'installe durablement"},{"t":"Faire du bénévolat à l'étranger est souvent sujet à controverse : missions peu claires ou non conformes à des principes éthiques, prix exorbitants, flou artistique et manque de transparence concernant la destination de l'argent récolté... Certaines agences spécialisées dans le domaine profitent de la tendance du tourisme solidaire pour s'enrichir ! D'autres, au contraire, affichent clairement leurs exigences et leurs engagements. C'est le cas de « Travailler à l'étranger », basé au Royaume-Uni et qui envoie des voyageurs volontaires à travers le monde depuis 1997. Ils s'assurent du suivi des stagiaires, visitent toutes les structures et créent de vrais liens avec leurs partenaires.","q":"Quel est l'objectif de l'agence « Travailler à l'étranger » ?","c":["Faire découvrir des destinations authentiques.","Organiser des séjours à vocation humanitaire.","Recruter des salariés à l'international.","Reverser ses bénéfices à des associations."],"a":1,"k":"envoie des voyageurs volontaires à travers le monde"},{"t":"Dans la nuit de samedi à dimanche, il faudra retarder ses montres à 3 heures, il sera en fait 2 heures. Ce changement est conçu pour économiser de l'énergie en profitant des périodes de jour plus longues l'été. Selon un sondage, les Français seraient majoritairement contre cette pratique. Ils mettent en avant un impact négatif sur « le sommeil, l'alimentation ou l'humeur ». Cependant un rapport de Sénat de l'année dernière assurait que le monde médical restait partagé sur l'existence de troubles imputables à l'heure d'été, mais que de nombreux pharmaciens faisaient état d'une augmentation de leurs ventes de médicaments au moment du changement d'heure, encore qu'aucune étude scientifique ne puisse l'attribuer à ce seul facteur.","q":"Qu'apprend-on sur le passage à l'heure d'hiver ?","c":["Il est difficile d'en évaluer l'impact sur la santé.","Il permet la consommation de médicaments.","Le sénat a toujours refusé de voter une loi sur le sujet.","Les Français sont encore attachés à cette tradition."],"a":0,"k":"le monde médical restait partagé sur l'existence de troubles"},{"t":"Durant les investigations journalistiques, le recours à la caméra cachée est de plus en plus fréquent. Mais souvent, son utilisation n'est aussi qu'un cache-misère, un moyen de compenser l'absence d'informations dans les reportages, de remplir le vide par des scènes un peu spectaculaires. C'est une manière pour certains aussi de faire des économies. Par ailleurs, cette pratique pose une autre question celle du statut de personne filmée à son insu. La filmer en caméra cachée, n'est-ce pas supposer qu'elle a quelque chose à se reprocher avant d'avoir Commencé à parler ?","q":"D'après ce texte, pourquoi les journalistes utilisent ils des caméras cachées ?","c":["Pour améliorer la qualité des documentaires.","Pour dissimuler la pauvreté des contenus.","Pour moderniser leurs méthodes de travail.","Pour piéger les gens visés par les enquêtes."],"a":1,"k":"un moyen de compenser l'absence d'informations dans les reportages"},{"t":"Nouvelle arrestation de pilleurs\nAprès l'arrestation de pilleurs en France, l'UNESCO lance un cri d'alarme pour la protection du patrimoine sous-marin. Au total, selon UNESCO, ce serait plus de trois millions d'épaves non explorées qui seraient menacées par les exactions des chasseurs de trésors. Le patrimoine subaquatique est de plus en plus menacé du fait des progrès techniques qui permettent aux chasseurs de trésors de sortir des objets protégés depuis des siècles par les eaux.","q":"Que dit ce texte ?","c":["La faune aquatique est en danger.","La technologie facilite le pillage des mers.","Le nombre de voleurs dépaves augmente.","Les bateaux en détresse sont laissés à leur sort."],"a":1,"k":"progrès techniques qui permettent aux chasseurs de trésors"},{"t":"Les chutes d'attention et le relâchement musculaire signalent un besoin des plus naturels : dormir. Interrompe sa journée pour ce moment réparateur, c'est compenser les nuits trop courtes et éviter que ce manque de sommeil ne grignote la santé physique et mentale. Mais pourquoi ce remède ancestral est-il à ce point sous-estimé ? En fait, la sieste n'est pas tant incomprise que redoutée. En effet, travailler exige de répondre à des impératifs extérieurs parfois au détriment des besoins intérieurs ou physiologiques et faire la sieste devient une transgression. Rituel de l'été, la petite somme reste inacceptable au travail où le maitre mot est la productivité et pourtant, en aidant à rétablir l'équilibre physique, ne pourrait-il pas y contribuer ?","q":"Que suggère l'auteur au sujet de la sieste ?","c":["Elle devrait être réservée aux périodes de congés.","Elle est préconisée par la médecine.","Elle peine d se répandre en milieu professionnel.","Elle serait néfaste pour le rendement."],"a":2,"k":"la petite somme reste inacceptable au travail"},{"t":"Théâtre\nJoel Pommerat nous offre un très court spectacle dont à la fois la pureté formelle et le sens nous ont conquis. Le matériau en est constitué par une série de rencontres. Auxquelles lui-même et son équipe assistèrent, entre des travailleurs sociaux et des femmes d'origine simple, vivant en cité, et en proie à des problèmes familiaux. De ces confidences relatives aux tensions qu'elles connaissent dans leurs enfants. Pommerat a tiré une suite de brèves séquences qui composent une tragédie intense de la souffrance familiale, et particulièrement de la souffrance de la femme. Son regard sur la détresse humaine est d'une bienveillance et d'une tendresse infinies. Il ne nous livre aucun message moral et à peine un message social : il fait simplement appel à notre sensibilité.","q":"Dans quel objectif Joël Pommerat a-t-il créé son spectacle ?","c":["Aider les femmes à se battre pour améliorer leur situation familiale.","Amener les spectateurs à s'émouvoir d'un quotidien douloureux.","Démontrer que la condition de la femme dans les cités est désastreuse.","Informer des difficultés que peuvent rencontrer les enfants des cités."],"a":1,"k":"il fait simplement appel à notre sensibilité"},{"t":"Il est important d'alimenter l'imagination des enfants. Dans cette perspective, les matériaux les moins finis sont plus intéressants que les jouets sophistiqués, car ils laissent à l'enfant l'espace nécessaire pour tenter de les transformer et pour développer ses capacités créatives. Il importe également de tenir compte du caractère de chaque enfant. Certains sont entreprenants, d'autres plus contemplatifs. Cela ne signifie pas qu'ils ont un monde intérieur moins riche, mais que leur créativité s'exprime davantage dans la rêverie que dans l'action. Alimenter l'imagination des enfants, c'est leur ménager des moments d'ennui où ils auront à se remplir de leur inspiration.","q":"Selon cet article, que faut-il faire pour stimuler l'imagination des enfants ?","c":["Leur donner le gout de l'observation.","Leur permettre d'inventer des activités.","Leur procurer des jeux éducatifs.","Leur proposer des énigmes à résoudre."],"a":1,"k":"leur ménager des moments d'ennui"},{"t":"De plus en plus de scientifiques s'intéressent au fonctionnement du cerveau des tout-petits. En effet, comprendre le développement normal du cerveau permettra d'aider les bébés touchés par des troubles. Au-delà, l'ambition est de découvrir les racines de l'intelligence humaine : pourquoi l'homme, à la différence des autres espèces animales, peut parler, compter et même envoyer des fusées dans l'espace. Pendant longtemps, ces capacités uniques ont été attribuées à la taille de notre encéphale. Une idée finalement battue en brèche : le cerveau du bébé est bien moins gros que le nôtre ou que celui de nombreux animaux. Et pourtant, les tout-petits apprennent beaucoup de choses, bien plus vite et bien plus facilement que n'importe quel animal ou même que les adultes.","q":"Qu'apprend-on sur le cerveau humain ?","c":["Sa structure est identique chez l'homme et l'animal.","Sa taille influe sur les compétences cognitives.","Son développement est ralenti les premiers mois.","Son fonctionnement est encore mystérieux."],"a":3,"k":"battue en brèche"},{"t":"L'homme est de noir vêtu. Son crâne, nu, joue avec la lumière. Tout est dit, tout est là, dans ce jeu d'ombre et de clarté qui fait d'un bâtisseur un poète. Jean Nouvel façonne le mystère pour insuffler du vivant aux édifices au cœur de pierre et bâtit sans dénaturer. Cet architecte éclairé n'érige rien, il convie cette émotion, suscite une apparition pour sa dernière création, l'œil découvre une ville-musée aux formes douces, un dôme qui semble né des mains d'une dentellière. Le dôme repose sur quatre piliers pour gagner en légèreté et s'allier au paysage, trait d'union avec les nuages.","q":"Quelle particularité de Jean Nouvel est louée dans cet article ?","c":["Sa technique puise dans divers mouvements artistiques.","Ses œuvres se fondent dans leur environnement.","Son inspiration provient de ses nombreuses lectures.","Son savoir-faire met en valeur des procédés connus."],"a":1,"k":"s'allier au paysage"},{"t":"Imaginez un instant que nos espaces de travail soient inadaptés à la moitié des salariés : vous trouveriez cela pour le moins troublant, voire inacceptable. C'est pourtant le cas pour les personnes introverties qui, selon des recherches, représentent entre un tiers et la moitié de la population mondiale. Travail de groupe, réseaux sociaux, « Open space » : l'économie moderne exige d'interagir, faisant de l'aisance en public un avantage non négligeable dans le milieu professionnel. Les cultures d'entreprises qui mettent constamment en avant les échanges avec autrui finissent par dévaloriser l'identité des introvertis dont les capacités ne sont pas suffisamment sollicitées.","q":"Que dénonce l'auteur de cet article ?","c":["La primauté de l'apparence sur les compétences.","Le corporatisme pousse de certaines sociétés.","Le manque de formation aux nouvelles technologies.","Les principes actuels d'organisation du travail."],"a":3,"k":"dévaloriser l'identité des introvertis"},{"t":"Suite à un accident chimique sur un site minier, les pouvoirs publics ont décidé d'obliger les sociétés minières à financer des programmes de recherche et à replanter les surfaces exploitées. Et de fait, les compagnies minières jouent très bien le jeu. Comme il serait bien naïf de penser que leurs dirigeants soient tout à coup devenus philanthropes, il faut chercher la raison de cet intérêt ailleurs. Il se trouve qu'un scientifique, Anthony Van der Hent, a prouvé que des « super-plantes » avaient la faculté d'extraire du sol des métaux économiquement exploitables. C'est donc la possibilité d'allier la régénération de sites industriels à des assurances de gains financiers supplémentaires qui motivent tant les industriels.","q":"Sur quel point porte le scepticisme du journaliste ?","c":["La capacité des plantes à nettoyer les sols.","La rentabilité d'un nouveau système d'extraction.","Le résultat des recherches de Mr Van der Hent.","Les préoccupations écologistes des industriels."],"a":3,"k":"il serait bien naïf de penser que leurs dirigeants soient tout à coup devenus philanthropes"},{"t":"Une entreprise japonaise a présenté une étude sur une gigantesque structure d'habitation immergée. Futuriste ? Oui, car certaines technologies restent à mettre au point. Mais la recherche a été poussée assez loin et d'après ses concepteurs, une telle cité de la mer pourrait devenir envisageable à partir de 2030. Une vaste sphère de 500 mètres de diamètre abriterait des appartements, des hôtels, des bureaux et des laboratoires pour 4000 personnes. Le projet ne consiste pas en un espace aménagé en surface. Il s'agit au contraire d'exploiter le potentiel de l'océan profond et d'assurer la pérennité de l'espèce humaine. L'océan est une source d'énergie, d'eau douce et de nourriture. C'est aussi un très bon endroit pour retraiter notre production de dioxyde de carbone.","q":"Quel est l'objectif de ce projet ?","c":["Concevoir des lieux de vie alternatifs.","Étudier de nouvelles technologies.","Proposer des activités futuristes.","Protéger des espaces marins menacés."],"a":0,"k":"d'assurer la pérennité de l'espèce humaine"},{"t":"Selon la conception de Descartes, le corps est perçu comme séparé de l'esprit à éduquer. Cette idée selon laquelle le corps ne serait que naturel et biologique a été déconstruite par le sociologue Marcel Mauss en 1934. Dans ses travaux, il montre que le corps est le résultat d'une construction sociale, un matériau dans lequel s'impriment les marques d'une culture donnée dans une société donnée. Il n'existerait pas de manière « naturelle » de se développer, de bouger, de se comporter pour le corps humain. La marche ou la nage, qui paraissent ordinaires ou allant de soi, sont en réalité le reflet d'une éducation qui institue les manières dont les êtres humains apprennent à se servir de leur corps.","q":"Qu'ont montré les travaux de Marcel Mauss sur la façon des se mouvoir ?","c":["Elle représenterait l'influence de l'inconscient.","Elle résulterait de l'observation de normes.","Elle résulterait la part de l'acquis dû au groupe.","Elle serait issue du patrimoine génétique."],"a":2,"k":"le corps est le résultat d'une construction sociale"}]]
</script>

var ans = {}, cur = 0;

function getPoints(i) {
  var n = i + 1;
  if (n <= 4) return 3;
  if (n <= 10) return 9;
  if (n <= 19) return 15;
  if (n <= 29) return 21;
  if (n <= 35) return 26;
  return 33;
}

function getNclc(score) {
  if (score >= 549) return { level: "NCLC 10+", msg: "Excellent ! Niveau NCLC 10 et plus." };
  if (score >= 524) return { level: "NCLC 9", msg: "Très bien ! Niveau NCLC 9." };
  if (score >= 499) return { level: "NCLC 8", msg: "Très bien ! Niveau NCLC 8." };
  if (score >= 453) return { level: "NCLC 7", msg: "Objectif immigration atteint ! Niveau NCLC 7." };
  if (score >= 406) return { level: "NCLC 6", msg: "Encore un peu d'effort pour atteindre le NCLC 7 !" };
  if (score >= 375) return { level: "NCLC 5", msg: "Continuez à pratiquer, niveau NCLC 5." };
  if (score >= 342) return { level: "NCLC 4", msg: "Continuez à pratiquer, niveau NCLC 4." };
  return { level: "En dessous de NCLC 4", msg: "Continuez à pratiquer !" };
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hl(text, key) {
  var h = esc(text).split("\n").join("<br>");
  try {
    var ek = esc(key);
    var idx = h.toLowerCase().indexOf(ek.toLowerCase());
    if (idx >= 0) {
      h = h.substring(0,idx) + "<mark>" + h.substring(idx,idx+ek.length) + "</mark>" + h.substring(idx+ek.length);
    }
  } catch(e) {}
  return h;
}

function headerHtml() {
  var answered = Object.keys(ans).length;
  var pct = Math.round(answered / QQ.length * 100);
  return '<div class="header">' +
    '<img src="data:image/jpeg;base64,' + LOGO_B64 + '" alt="MLI Logo">' +
    '<div class="header-right">' +
    '<div class="header-title">Compréhension écrite – Test 26</div>' +
    '<div class="header-sub">' + QQ.length + ' questions &nbsp;|&nbsp; ' + answered + ' répondues</div>' +
    '</div></div>' +
    '<div class="prog-wrap">' +
    '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="prog-labels"><span>Question ' + (cur+1) + " / " + QQ.length + '</span><span>' + pct + '% complété</span></div>' +
    '</div>';
}

function render(i) {
  cur = i;
  var q = QQ[i], ua = ans[i], done = ua !== undefined;
  var textHtml = done ? hl(q.t, q.k) : esc(q.t).split("\n").join("<br>");
  var keyLabel = done ? '<div class="key-label">🔑 Phrase-clé surlignée</div>' : "";
  var navHtml = '<div class="nav">' +
    (cur > 0 ? '<button class="btn" onclick="render(' + (cur-1) + ')">← Précédente</button>' : '<button class="btn" disabled style="opacity:.4">← Précédente</button>') +
    (cur < QQ.length-1 ? '<button class="btn" onclick="render(' + (cur+1) + ')">Suivante →</button>' : '<button class="btn" disabled style="opacity:.4">Suivante →</button>') +
    '<button class="btn btn-results" onclick="summary()">Résultats</button>' +
    '</div>';
  var labels = ["A","B","C","D"];
  var choicesHtml = '<div class="choices">';
  for (var c = 0; c < q.c.length; c++) {
    var cls = "choice";
    if (done) {
      if (c === q.a) cls += " correct";
      else if (ua.choice === c) cls += " wrong";
    }
    var onclick = done ? "" : 'onclick="pick(' + i + ',' + c + ')"';
    choicesHtml += '<button class="' + cls + '" ' + onclick + '><span class="badge">' + labels[c] + '</span><span>' + esc(q.c[c]) + '</span></button>';
  }
  choicesHtml += '</div>';
  var feedbackHtml = "";
  if (done) {
    if (ua.ok) feedbackHtml = '<div class="feedback ok">✅ Correct !</div>';
    else feedbackHtml = '<div class="feedback ko">❌ Incorrect — La bonne réponse est : <strong>' + labels[q.a] + ') ' + esc(q.c[q.a]) + '</strong></div>';
  }
  document.getElementById("view").innerHTML =
    headerHtml() + navHtml +
    '<div class="textbox">' + textHtml + '</div>' +
    keyLabel +
    '<div class="question">' + esc(q.q) + '</div>' +
    choicesHtml + feedbackHtml;
  try { sessionStorage.setItem("tcf26_ans", JSON.stringify(ans)); sessionStorage.setItem("tcf26_cur", cur); } catch(e) {}
}

function pick(qi, ci) {
  if (ans[qi] !== undefined) return;
  ans[qi] = { choice: ci, ok: ci === QQ[qi].a };
  render(qi);
}

function summary() {
  var ok = 0, score = 0;
  for (var k in ans) { if (ans[k].ok) { ok++; score += getPoints(parseInt(k)); } }
  var nclc = getNclc(score);
  var labels = ["A","B","C","D"];
  var gridHtml = '<div class="grid">';
  for (var i = 0; i < QQ.length; i++) {
    var cls = "gcell na";
    if (ans[i] !== undefined) cls = ans[i].ok ? "gcell ok" : "gcell ko";
    gridHtml += '<div class="' + cls + '" onclick="render(' + i + ')" title="Q' + (i+1) + '">' + (i+1) + '</div>';
  }
  gridHtml += '</div>';
  document.getElementById("view").innerHTML =
    headerHtml() +
    '<div class="summary-card">' +
    '<div style="font-size:15px;color:#555;margin-bottom:4px">Résultats</div>' +
    '<div class="score-big">' + ok + ' / ' + QQ.length + ' <span style="font-size:16px;color:#555">réponses correctes</span></div>' +
    '<div style="font-size:22px;font-weight:700;margin:8px 0">Score TCF estimé : <span style="color:#1a1a1a">' + score + ' / 699</span></div>' +
    '<div class="nclc-badge">' + nclc.level + '</div>' +
    '<div style="font-size:14px;color:#555;margin-bottom:1rem">' + esc(nclc.msg) + '</div>' +
    gridHtml +
    '<div style="margin-top:.5rem">' +
    '<button class="btn-report" onclick="showReport()">📋 Voir le rapport des erreurs</button>' +
    '<button class="btn-restart" onclick="restart()">↺ Recommencer</button>' +
    '</div>' +
    '<div class="note-small">* Score estimatif à titre indicatif</div>' +
    '</div>';
}

function showReport() {
  var labels = ["A","B","C","D"];
  var html = '<button class="btn-back" onclick="summary()">← Retour aux résultats</button>';
  html += '<h2 style="font-size:18px;font-weight:700;margin-bottom:1rem">📋 Rapport des erreurs</h2>';
  var found = false;
  for (var i = 0; i < QQ.length; i++) {
    if (ans[i] !== undefined && !ans[i].ok) {
      found = true;
      var q = QQ[i];
      html += '<div class="report-q">';
      html += '<div style="font-size:12px;color:#888;margin-bottom:.4rem">Question ' + (i+1) + '</div>';
      html += '<div class="r-text">' + hl(q.t, q.k) + '</div>';
      html += '<div class="key-label">🔑 Phrase-clé surlignée</div>';
      html += '<div style="font-weight:600;font-size:14px;margin:.5rem 0">' + esc(q.q) + '</div>';
      for (var c = 0; c < q.c.length; c++) {
        var cls2 = "choice";
        if (c === q.a) cls2 += " correct";
        else if (ans[i].choice === c) cls2 += " wrong";
        html += '<div class="' + cls2 + '" style="margin-bottom:6px"><span class="badge">' + labels[c] + '</span><span>' + esc(q.c[c]) + '</span></div>';
      }
      html += '</div>';
    }
  }
  if (!found) html += '<div style="font-size:15px;color:#1D9E75;font-weight:600">🎉 Aucune erreur ! Parfait !</div>';
  document.getElementById("view").innerHTML = html;
}

function restart() {
  ans = {}; cur = 0;
  try { sessionStorage.removeItem("tcf26_ans"); sessionStorage.removeItem("tcf26_cur"); } catch(e) {}
  render(0);
}

window.onload = function() {
  try {
    var sa = sessionStorage.getItem("tcf26_ans");
    var sc = sessionStorage.getItem("tcf26_cur");
    if (sa) ans = JSON.parse(sa);
    if (sc) cur = parseInt(sc);
  } catch(e) {}
  render(cur);
};
</script>
</body>
</html>
